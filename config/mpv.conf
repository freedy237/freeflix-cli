# ────────────────────────────────────────────────────────────
# mpv — équilibre stabilité / fluidité.
# Partagé avec ~/.config/haruna/mpv.conf (libmpv embed).
# ────────────────────────────────────────────────────────────

# ─── Anti-crash : empêche le hook yt-dlp de planter sur les URLs ─
# proxy locales d'autoflix (http://127.0.0.1:PORT/stream?…). C'est
# la cause #1 des "Errors when loading file" qu'on voyait avant.
ytdl=no

# ─── Renderer : OpenGL legacy (pas Vulkan/libplacebo) ────────
# Dans mpv 0.41, `vo=gpu` choisit libplacebo+Vulkan par défaut, qui
# plante en VK_ERROR_OUT_OF_DEVICE_MEMORY sur GPU intégré faible
# VRAM — c'est ce qui causait les freezes après 1-2 min ET empêchait
# les shaders Anime4K de se charger. `gpu-api=opengl` force l'ancien
# pipeline OpenGL qui est stable même sur iGPU.
vo=gpu
gpu-api=opengl
hwdec=auto-safe

# ─── Persistence ─────────────────────────────────────────────
save-position-on-quit=yes
watch-later-options=start,pause

# ─── Cache : 250 MB / 3 min — résilient aux coupures réseau ──
# Le but : si la connexion fait n'importe quoi pendant 1-3 min, le
# buffer suffit pour continuer à jouer. Quand le buffer s'épuise,
# cache-pause met en pause au lieu de jeter l'éponge, et reprend
# tout seul quand le réseau revient.
cache=yes
cache-secs=180                     # 3 min de readahead
demuxer-max-bytes=250M             # 250 MB RAM (~4 min @ 720p, ~80s @ 1080p)
demuxer-readahead-secs=180
demuxer-seekable-cache=yes          # seek dans le cache RAM = gratuit
demuxer-max-back-bytes=80M          # 80 MB de passé conservé
cache-on-disk=no                    # RAM uniquement (rapide)
hr-seek-framedrop=yes               # drop frames pendant hr-seek

# ─── Comportement quand le buffer s'épuise ────────────────────
# Au lieu de freeze ou crash, mpv pause proprement et attend que
# le buffer se refasse. Reprend automatiquement.
cache-pause=yes                     # pause si buffer empty
cache-pause-wait=5                  # attend ≥5s pendant la pause (laisse le temps de remplir)
cache-pause-initial=no              # mais ne pause PAS au lancement initial

# Garde mpv ouvert même si la connexion meurt complètement —
# l'utilisateur peut décider quand quitter, pas mpv.
keep-open=yes
keep-open-pause=no

# ─── Reconnect : doit gérer les drops réseau SANS boucler ────
# CRUCIAL : pas de `reconnect_at_eof=1` — c'est lui qui causait la
# boucle infinie "Will reconnect at 1506" quand le CDN refuse.
# reconnect_delay_max=10 → attend jusqu'à 10s entre les tentatives
# (vs 3s avant) — c'est plus doux pour les CDN en saturation et
# évite le rate-limiting.
stream-lavf-o=reconnect=1,reconnect_streamed=1,reconnect_delay_max=10

# Silence le spam terminal. `quiet=yes` masque les messages info
# (status line, "Audio device underrun", "Error decoding audio",
# "Invalid PTS", etc.) sans pour autant cacher les vraies erreurs.
# msg-level reste pour matraquer ffmpeg/ad/vd qui sont les plus
# bavards quand le CDN faiblit.
quiet=yes
msg-level=ffmpeg=fatal,ad=error,vd=error,ao=error,af=error

# Audio plus tolérant : buffer plus gros + resampling asynchrone
# pour absorber les saccades de PTS sans cracher d'erreur.
audio-buffer=0.5
audio-stream-silence=yes
audio-fallback-to-null=yes

# ─── Network timeout généreux ────────────────────────────────
# Beaucoup de CDN gratuits prennent 30-60s sur un segment HLS aux
# heures de pointe. 120s laisse une vraie chance avant d'abandonner.
network-timeout=120

# ─── Sous-titres ─────────────────────────────────────────────
sub-auto=fuzzy
sub-font='Inter'
sub-font-size=42
sub-border-size=2.5
sub-color='#FFFFFFFF'
sub-border-color='#FF000000'
sub-shadow-offset=1
sub-shadow-color='#80000000'
sub-ass-override=yes

# ─── Audio ──────────────────────────────────────────────────
volume-max=200

# ─── Screenshots ────────────────────────────────────────────
screenshot-directory=~/Pictures/mpv
screenshot-format=png
screenshot-template='%F-%P'

# ─── Anime4K : Mode A_S (Small) par défaut — équilibre GPU ──
# 3 niveaux dispos via les keybinds dans input.conf :
#   CTRL+1 → Mode A_VL (Very Lite — qualité max, GPU le plus lourd)
#   CTRL+2 → Mode A_S  (Small — défaut, ~3× moins de GPU)
#   CTRL+0 → OFF
# Le S garde quand même le CNN + Restore, juste avec un réseau plus
# petit. Sur un GPU intégré, on passe d'un drop FPS visible à fluide.
glsl-shaders="~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Restore_CNN_S.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_S.glsl"

# Auto-désactive Anime4K quand la source est déjà ≥ 1080p — pas
# de bénéfice à upscaler 1080→2160 sur ce hardware, et ça mange du GPU
# pour rien.
[anime4k-skip-high-res]
profile-cond=p["video-params/h"] ~= nil and p["video-params/h"] >= 1080
profile-restore=copy-equal
glsl-shaders=
