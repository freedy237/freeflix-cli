# ────────────────────────────────────────────────────────────
# mpv — stability-first config.
# Used by mpv standalone AND by Haruna (which embeds libmpv).
# Keep ~/.config/mpv/mpv.conf and ~/.config/haruna/mpv.conf in sync.
# ────────────────────────────────────────────────────────────

# ─── Don't let yt-dlp hijack proxy URLs ─────────────────────
# When autoflix passes an URL like http://127.0.0.1:PORT/stream?...
# mpv's ytdl_hook tries to "smart-parse" it as a video site, fails,
# and aborts the file. Disable the hook entirely. mpv itself still
# plays remote HTTP just fine.
ytdl=no

# ─── Video output : stable GPU renderer ─────────────────────
# `gpu-next` is newer but crashes on some Mesa/Intel drivers.
# `gpu` is the long-time stable default.
vo=gpu

# ─── Hardware decoding : safe but graceful ──────────────────
# `auto-safe` only uses hwdec for codecs known not to break ; if
# a codec isn't whitelisted it falls back to software automatically.
hwdec=auto-safe

# ─── Persistence : resume where you left off ────────────────
save-position-on-quit=yes
watch-later-options=start,pause

# ─── Subtitles (robust to malformed files) ──────────────────
sub-auto=fuzzy
sub-font='Inter'
sub-font-size=42
sub-border-size=2.5
sub-color='#FFFFFFFF'
sub-border-color='#FF000000'
sub-shadow-offset=1
sub-shadow-color='#80000000'
sub-ass-override=yes              # don't trust embedded ASS styles blindly

# ─── Audio ─────────────────────────────────────────────────
volume-max=200

# ─── Screenshots ───────────────────────────────────────────
screenshot-directory=~/Pictures/mpv
screenshot-format=png
screenshot-template='%F-%P'

# ─── Streaming cache (conservative) ────────────────────────
# Smaller defaults than before — large cache + slow decoding =
# more chance of stutter/freeze on weaker hardware.
cache=yes
cache-secs=20
demuxer-max-bytes=80M
demuxer-readahead-secs=10

# ─── Network reliability ───────────────────────────────────
# IMPORTANT : pas de stream-lavf-o reconnect ici.
# Quand un CDN refuse vraiment (Cloudflare, token expiré), ffmpeg
# part en boucle infinie de reconnect au même offset (souvent ~1506
# octets) au lieu d'abandonner. L'autoflix proxy a déjà sa propre
# logique de retry — doubler ici cause un livelock.
network-timeout=15                # mpv abandonne tout seul après 15s

# ─── Anime4K Mode A_VL : actif par défaut ──────────────────
# Toggle runtime : CTRL+1 → on, CTRL+0 → off (input.conf).
glsl-shaders="~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Restore_CNN_VL.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_VL.glsl"
