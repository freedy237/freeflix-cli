# ─── Anime4K runtime toggle ───
# CTRL+1 → enable Mode A_VL
# CTRL+0 → disable shaders
CTRL+1 no-osd change-list glsl-shaders set "~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Restore_CNN_VL.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_VL.glsl"; show-text "Anime4K: Mode A_VL ON"
CTRL+0 no-osd change-list glsl-shaders clr ""; show-text "Anime4K: OFF"

# ─── Cycle des pistes vidéo / audio / sous-titres ───
_ cycle video       ; show-text "Video track: ${vid}"
ALT+v cycle video   ; show-text "Video track: ${vid}"

# ─── Set direct (utile quand cycle video ne réagit pas) ───
ALT+1 set vid 1     ; show-text "Video → 1"
ALT+2 set vid 2     ; show-text "Video → 2"
ALT+3 set vid 3     ; show-text "Video → 3"
ALT+4 set vid 4     ; show-text "Video → 4"

# ─── Diagnostic : afficher combien de pistes vidéo Haruna détecte ───
ALT+t show-text "vid=${vid} | track count=${track-list/count}" 4000
# (Audio et subs sont déjà bindés par mpv : '#' et 'j')
